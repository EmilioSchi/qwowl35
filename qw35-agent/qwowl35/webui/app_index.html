<!DOCTYPE html>
<!--
  Vendored from textual-serve 1.1.3 templates/app_index.html for `--ui webgui`.

  Two changes vs stock: the Google Fonts stylesheet link is removed, and the
  fonts/active.css stylesheet below carries the @font-face rules for the font
  picked with /fonts (families vendored in qwowl35/webui/fonts/<slug>/). The
  server generates active.css from the persisted preference at startup, and
  /fonts previews/commits rewrite it in place. The terminal renderer inside
  js/textual.js hardcodes fontFamily "Roboto Mono"; active.css re-binds that
  name as an alias to the active family's files — @font-face beats any local
  "Roboto Mono" install during CSS font matching — so this page uses
  "Roboto Mono" everywhere.

  Live apply: the watcher script at the bottom polls fonts/active.json and, on
  a slug change, hot-swaps the active.css link (restyling this page's DOM via
  the alias) and re-fonts the running terminal through the wrapper instance
  the server patches onto the element as el.__qwowlTerm (see
  __main__._expose_terminal_instance) — pywebview windows have no reload
  button, so /fonts must land without one.
-->
<html>
  <head>
    <link rel="stylesheet" href="{{ config.static.url }}css/xterm.css" />
    <link rel="stylesheet" href="{{ config.static.url }}fonts/active.css" id="active-font-css" />

    <script src="{{ config.static.url }}js/textual.js"></script>
    <style>
      body {
        background: #0c181f;
      }

      .dialog-container {
        position: absolute;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        box-shadow: var(--shadow-elevation-high);
      }
      .shade {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #0c181f;
        background-image: url("{{ config.static.url }}images/background.png");
      }
      .intro {
        width: 640px;
        height: 240px;
        font-size: 16px;
        z-index: 20;
        font-family: "Roboto Mono", menlo, monospace;
        text-align: center;
        opacity: 1;
        color: rgba(255, 255, 255, 0.95);
        background-color: #12232d;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 32px;
      }

      body.-first-byte .intro-dialog,
      body.-first-byte .intro-dialog .shade {
        opacity: 0;
        transition: opacity 0.3s ease-out;
        display: none;
      }

      body .textual-terminal {
        opacity: 0;
        transition: opacity 0.3s ease-out;
      }

      body.-first-byte .textual-terminal {
        opacity: 1;
        transition: opacity 0.3s ease-out;
      }

      .intro svg {
        padding-right: 16px;
      }

      body Button {
        padding: 16px 32px;
        background-color: #5e0ba7;
        color: rgba(255, 255, 255, 0.95);
        border: none;
        font-family: "Roboto Mono", menlo, monospace;
        margin: 16px;
        display: block;
      }

      Button:hover {
        background: #ac5af4;
        cursor: pointer;
      }

      .closed-dialog {
        opacity: 0;
        display: none;
      }

      body.-closed .closed-dialog {
        opacity: 1;
        display: flex;
      }

      #start {
        display: none;
      }

      #start.-delay {
        display: flex;
      }
    </style>
    <script>
      // /fonts live apply: watch the generated active.json manifest; on a slug
      // change, reload the stylesheet and re-font the running terminal.
      (function () {
        const fontsUrl = "{{ config.static.url }}fonts/";
        let activeSlug = null;

        function swapStylesheet() {
          return new Promise((resolve) => {
            const link = document.getElementById("active-font-css");
            link.onload = link.onerror = resolve;
            link.href = fontsUrl + "active.css?v=" + Date.now();
          });
        }

        async function applyFont(info) {
          await swapStylesheet();
          const family = "'" + info.family + "'";
          // Pull the faces in now so the terminal never measures a fallback.
          try {
            await Promise.all(
              ["16px", "bold 16px", "italic 16px", "bold italic 16px"].map(
                (prefix) => document.fonts.load(prefix + " " + family)
              )
            );
          } catch (err) {}
          document.querySelectorAll(".textual-terminal").forEach((el) => {
            const term = el.__qwowlTerm; // absent if the server-side JS patch missed
            if (term && term.terminal) {
              // A genuinely new fontFamily string makes xterm re-measure the
              // cell box and rebuild its glyph atlas; refit resizes the app.
              term.terminal.options.fontFamily =
                family + ", Monaco, 'Courier New', monospace";
              if (term.fit) term.fit();
            }
          });
        }

        async function pollFont() {
          try {
            const resp = await fetch(fontsUrl + "active.json", { cache: "no-store" });
            if (!resp.ok) return;
            const info = await resp.json();
            if (activeSlug === null) {
              activeSlug = info.slug; // initial load already ships this font
            } else if (info.slug !== activeSlug) {
              activeSlug = info.slug;
              await applyFont(info);
            }
          } catch (err) {}
        }

        setInterval(pollFont, 1000);
      })();

      function getStartUrl() {
        const url = new URL(window.location.href);
        const params = new URLSearchParams(url.search);
        params.delete("delay");
        return url.pathname + "?" + params.toString();
      }
      async function refresh() {
        const ping_url = document.body.dataset.pingurl;
        if (ping_url) {
          await fetch(ping_url, {
            method: "GET",
            mode: "no-cors",
          });
        }
        window.location.href = getStartUrl();
      }
    </script>
  </head>
  <body data-pingurl="{{ ping_url }}">
    <div class="dialog-container intro-dialog">
      <div class="shade"></div>
      <div class="intro">
        <svg
          width="32px"
          viewBox="0 0 2933 2261"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M2927.81 0H1677.1L1312.35 205.173H306.689L0.359375 434.921L204.029 893.177H735.972L644.784 2261H1060.36L1441.72 1974.97L2073.92 688.003H2334.4L2717.9 472.286L2927.81 0ZM1245.82 410.347L1276.32 277.656H330.85L153.929 410.347H1245.82ZM1229.16 482.83H100.972L251.134 820.694H813.449L722.26 2188.52H837.043L1229.16 482.83ZM1350.7 277.656L911.417 2188.52H1023.87L1662.19 615.52H2301.36L2451.52 277.656H1350.7ZM1460.19 205.173H2497.79L2733.69 72.4829H1696.09L1460.19 205.173Z"
            fill="#ffffff"
          />
        </svg>

        <div>{{ application.name or 'Textual Application' }}</div>
        <button type="button" onClick="refresh()" id="start">Start</button>
      </div>
    </div>

    <div class="dialog-container closed-dialog">
      <div class="shade"></div>
      <div class="intro">
        <div class="message">Session ended.</div>
        <button type="button" onClick="refresh()">Restart</button>
      </div>
    </div>

    <div
      id="terminal"
      class="textual-terminal"
      data-session-websocket-url="{{ app_websocket_url }}"
      data-font-size="{{ font_size }}"
    ></div>
  </body>
</html>
